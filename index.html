<!DOCTYPE html> <html> <head> <title>Fee Defaulter Tool</title> <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script> </head> <body> <h2>Fee Defaulter Tool</h2>

<input type="file" id="paidFile"><br><br>
<input type="file" id="dueFile"><br><br>

<button id="runBtn">Run</button>

<pre id="result"></pre> <script> document.getElementById("runBtn").addEventListener("click", processData) function readExcel(file) { return new Promise(function(resolve) { var reader = new FileReader() reader.onload = function(e) { var data = new Uint8Array(e.target.result) var workbook = XLSX.read(data, { type: 'array' }) var sheet = workbook.Sheets[workbook.SheetNames[0]] var json = XLSX.utils.sheet_to_json(sheet) resolve(json) } reader.readAsArrayBuffer(file) }) } async function processData() { var paidFile = document.getElementById("paidFile").files[0] var dueFile = document.getElementById("dueFile").files[0] if (!paidFile || !dueFile) { alert("Upload both files") return } var paidData = await readExcel(paidFile) var dueData = await readExcel(dueFile) var paidIds = new Set() for (var i = 0; i < paidData.length; i++) { paidIds.add(String(paidData[i].StudentId)) } var unpaid = [] for (var j = 0; j < dueData.length; j++) { var id = String(dueData[j].StudentId) if (!paidIds.has(id)) { unpaid.push(dueData[j]) } } document.getElementById("result").textContent = JSON.stringify(unpaid, null, 2) } </script> </body> </html>
