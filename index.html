<!DOCTYPE html> <html> <head> <title>Fee Tool</title> <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script> </head> <body> <h2>Fee Defaulter Tool</h2>

<input type="file" id="paidFile"><br><br>
<input type="file" id="dueFile"><br><br>

<button onclick="processData()">Run</button>

<pre id="result"></pre> <script> function readExcel(file) { return new Promise(function(resolve) { var reader = new FileReader() reader.onload = function(e) { var data = new Uint8Array(e.target.result) var wb = XLSX.read(data, { type: 'array' }) var sheet = wb.Sheets[wb.SheetNames[0]] resolve(XLSX.utils.sheet_to_json(sheet)) } reader.readAsArrayBuffer(file) }) } async function processData() { var paidFile = document.getElementById("paidFile").files[0] var dueFile = document.getElementById("dueFile").files[0] if (!paidFile || !dueFile) { alert("Upload both files") return } var paidData = await readExcel(paidFile) var dueData = await readExcel(dueFile) var paidIds = new Set(paidData.map(function(r) { return String(r.StudentId) })) var unpaid = dueData.filter(function(r) { return !paidIds.has(String(r.StudentId)) }) document.getElementById("result").textContent = JSON.stringify(unpaid, null, 2) } </script> </body> </html>
