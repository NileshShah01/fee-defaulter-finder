<!DOCTYPE html> <html> <head> <title>Fee Tool</title> <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> </head> <body> <input type="file" id="paidFile"> <input type="file" id="dueFile"> <button onclick="processData()">Run</button> <div id="result"></div> <script> let unpaidData = [] function readExcel(file) { return new Promise(resolve => { const reader = new FileReader() reader.onload = function(e) { const data = new Uint8Array(e.target.result) const wb = XLSX.read(data, { type: 'array' }) const sheet = wb.Sheets[wb.SheetNames[0]] resolve(XLSX.utils.sheet_to_json(sheet)) } reader.readAsArrayBuffer(file) }) } async function processData() { const paidFile = document.getElementById("paidFile").files[0] const dueFile = document.getElementById("dueFile").files[0] const paidData = await readExcel(paidFile) const dueData = await readExcel(dueFile) const paidIds = new Set(paidData.map(r => String(r.StudentId))) unpaidData = dueData.filter(r => !paidIds.has(String(r.StudentId))) document.getElementById("result").innerText = JSON.stringify(unpaidData, null, 2) } </script> </body> </html>
